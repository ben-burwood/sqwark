services:
  sqwark:
    container_name: sqwark
    build: .
    ports:
      - 8080:8080
    environment:
      - SQWARK_API_KEY=${SQWARK_API_KEY:-dev}
      - DASHBOARD_USER=${SQWARK_DASHBOARD_USER:-admin}
      - DASHBOARD_PASSWORD=${SQWARK_DASHBOARD_PASSWORD:-admin}
    volumes:
      - sqwark-data:/data

volumes:
  sqwark-data:
